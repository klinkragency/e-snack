syntax = "proto3";

package esnack.order.v1;

option go_package = "github.com/klinkragency/e-snack/gen/order/v1;orderv1";

import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";

service OrderService {
  // Create a new order (client)
  rpc CreateOrder(CreateOrderRequest) returns (Order) {
    option (google.api.http) = {
      post: "/api/v1/orders"
      body: "*"
    };
  }

  // Get order by ID
  rpc GetOrder(GetOrderRequest) returns (Order) {
    option (google.api.http) = {
      get: "/api/v1/orders/{id}"
    };
  }

  // List user's orders
  rpc ListMyOrders(ListMyOrdersRequest) returns (ListOrdersResponse) {
    option (google.api.http) = {
      get: "/api/v1/orders"
    };
  }

  // List restaurant orders (admin)
  rpc ListRestaurantOrders(ListRestaurantOrdersRequest) returns (ListOrdersResponse) {
    option (google.api.http) = {
      get: "/api/v1/admin/restaurants/{restaurant_id}/orders"
    };
  }

  // Update order status (admin)
  rpc UpdateOrderStatus(UpdateOrderStatusRequest) returns (Order) {
    option (google.api.http) = {
      patch: "/api/v1/admin/orders/{id}/status"
      body: "*"
    };
  }

  // Cancel order (client or admin)
  rpc CancelOrder(CancelOrderRequest) returns (Order) {
    option (google.api.http) = {
      post: "/api/v1/orders/{id}/cancel"
      body: "*"
    };
  }

  // Update estimated prep time (admin)
  rpc UpdateOrderPrepTime(UpdateOrderPrepTimeRequest) returns (Order) {
    option (google.api.http) = {
      patch: "/api/v1/admin/orders/{id}/prep-time"
      body: "*"
    };
  }
}

message CreateOrderRequest {
  string restaurant_id = 1;
  string order_type = 2; // delivery, pickup, dine_in
  repeated OrderItemInput items = 3;

  // Delivery info
  string delivery_address = 4;
  double delivery_lat = 5;
  double delivery_lng = 6;
  string delivery_instructions = 7;

  // Dine-in
  string table_number = 8;

  // Pickup
  google.protobuf.Timestamp scheduled_pickup_time = 9;

  // Promo
  string promo_code = 10;

  // Customer notes (optional message to restaurant)
  string customer_notes = 11;

  // Payment type: "online" (default, via Mollie) or "on_site" (pay at pickup)
  string payment_type = 12;
}

message OrderItemInput {
  string product_id = 1;
  int32 quantity = 2;
  string notes = 3;
  repeated string option_choice_ids = 4;
  // Formula support: when set, this is a formula order item
  string item_type = 5; // "product" (default) or "formula"
  string formula_id = 6;
  repeated FormulaProductSelection formula_selections = 7;
}

message FormulaProductSelection {
  string product_id = 1;
  repeated string option_choice_ids = 2;
}

message GetOrderRequest {
  string id = 1;
}

message ListMyOrdersRequest {
  int32 page = 1;
  int32 page_size = 2;
}

message ListRestaurantOrdersRequest {
  string restaurant_id = 1;
  string status = 2; // Filter by status (optional)
  int32 page = 3;
  int32 page_size = 4;
}

message ListOrdersResponse {
  repeated Order orders = 1;
  int32 total = 2;
  int32 page = 3;
  int32 page_size = 4;
}

message UpdateOrderStatusRequest {
  string id = 1;
  string status = 2;
  string notes = 3;
}

message CancelOrderRequest {
  string id = 1;
  string reason = 2;
}

message UpdateOrderPrepTimeRequest {
  string id = 1;
  int32 minutes = 2;
}

message Order {
  string id = 1;
  string user_id = 2;
  string restaurant_id = 3;
  string restaurant_name = 4;
  string order_type = 5;
  string status = 6;

  double subtotal = 7;
  double delivery_fee = 8;
  double discount = 9;
  double total = 10;

  string delivery_address = 11;
  double delivery_lat = 12;
  double delivery_lng = 13;
  string delivery_instructions = 14;

  string table_number = 15;
  google.protobuf.Timestamp scheduled_pickup_time = 16;

  string payment_status = 17;
  string payment_intent_id = 18;

  repeated OrderItem items = 19;
  repeated OrderStatusChange status_history = 20;

  google.protobuf.Timestamp created_at = 21;
  google.protobuf.Timestamp updated_at = 22;
  google.protobuf.Timestamp completed_at = 23;

  // Customer info (populated for admin views)
  string customer_name = 24;
  string customer_email = 25;
  string customer_phone = 26;

  // Driver info (populated for admin views)
  string driver_id = 27;
  string driver_name = 28;
  string driver_phone = 29;

  // Customer notes
  string customer_notes = 30;

  // Estimated preparation time in minutes (set by admin to inform client)
  int32 estimated_prep_minutes = 31;

  int64 order_number = 32;
}

message OrderItem {
  string id = 1;
  string product_id = 2;
  string product_name = 3;
  double unit_price = 4;
  int32 quantity = 5;
  double total = 6;
  string notes = 7;
  repeated OrderItemOption options = 8;
  // Formula support
  string item_type = 9;
  string formula_id = 10;
  string formula_name = 11;
  repeated OrderFormulaProduct formula_products = 12;
}

message OrderFormulaProduct {
  string id = 1;
  string product_name = 2;
  int32 position = 3;
  repeated OrderItemOption options = 4;
}

message OrderItemOption {
  string id = 1;
  string option_name = 2;
  string choice_name = 3;
  double price_modifier = 4;
}

message OrderStatusChange {
  string id = 1;
  string status = 2;
  string changed_by = 3;
  string notes = 4;
  google.protobuf.Timestamp created_at = 5;
}
