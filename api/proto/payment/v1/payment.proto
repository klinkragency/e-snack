syntax = "proto3";

package esnack.payment.v1;

option go_package = "github.com/klinkragency/e-snack/gen/payment/v1;paymentv1";

import "google/api/annotations.proto";

service PaymentService {
  // Create payment for an order (returns Mollie checkout URL)
  rpc CreatePayment(CreatePaymentRequest) returns (PaymentResponse) {
    option (google.api.http) = {
      post: "/api/v1/orders/{order_id}/payment"
      body: "*"
    };
  }

  // Request refund for an order (admin)
  rpc RefundPayment(RefundPaymentRequest) returns (RefundResult) {
    option (google.api.http) = {
      post: "/api/v1/admin/orders/{order_id}/refund"
      body: "*"
    };
  }

  // Get payment status
  rpc GetPaymentStatus(GetPaymentStatusRequest) returns (PaymentStatus) {
    option (google.api.http) = {
      get: "/api/v1/orders/{order_id}/payment/status"
    };
  }
}

message CreatePaymentRequest {
  string order_id = 1;
  string redirect_url = 2; // Custom deep link for mobile (e.g. esnack:// or exp://)
}

message PaymentResponse {
  string id = 1;
  string checkout_url = 2;
  int64 amount = 3; // Amount in cents
  string currency = 4;
  string status = 5;
}

message RefundPaymentRequest {
  string order_id = 1;
  int64 amount = 2; // Amount in cents, 0 = full refund
  string reason = 3;
}

message RefundResult {
  string refund_id = 1;
  string status = 2;
  int64 amount = 3;
  string error_message = 4;
}

message GetPaymentStatusRequest {
  string order_id = 1;
}

message PaymentStatus {
  string order_id = 1;
  string payment_id = 2;
  string status = 3;
  int64 amount = 4;
  string currency = 5;
}
