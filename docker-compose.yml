services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-esnack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-esnack_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-esnack} -d ${POSTGRES_DB:-esnack_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    image: migrate/migrate:v4.18.3
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./api/migrations:/migrations
    command: ["-path", "/migrations", "-database", "postgres://${POSTGRES_USER:-esnack}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-esnack_db}?sslmode=disable", "up"]

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      ENV: production
      HTTP_PORT: "8080"
      GRPC_PORT: "50051"
      DATABASE_URL: postgres://${POSTGRES_USER:-esnack}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-esnack_db}?sslmode=disable
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      INITIAL_ADMIN_EMAIL: ${INITIAL_ADMIN_EMAIL:-}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:-}
      INITIAL_ADMIN_NAME: ${INITIAL_ADMIN_NAME:-Admin}
      INITIAL_RESTAURANT_NAME: ${INITIAL_RESTAURANT_NAME:-}
      INITIAL_RESTAURANT_SLUG: ${INITIAL_RESTAURANT_SLUG:-}
      ALLOWED_ORIGIN: ${ALLOWED_ORIGIN}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-uploads}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-true}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL}
      MOLLIE_API_KEY: ${MOLLIE_API_KEY:-}
      PUBLIC_URL: ${PUBLIC_URL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-smtp}
      EMAIL_API_KEY: ${EMAIL_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-e-Snack}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./www
      dockerfile: Dockerfile
      args:
        BACKEND_URL: http://api:8080
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
        NEXT_PUBLIC_POSTHOG_KEY: ${NEXT_PUBLIC_POSTHOG_KEY:-}
        NEXT_PUBLIC_POSTHOG_HOST: ${NEXT_PUBLIC_POSTHOG_HOST:-https://us.i.posthog.com}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      BACKEND_URL: http://api:8080
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
      REDIS_URL: redis://redis:6379
      POSTHOG_PERSONAL_API_KEY: ${POSTHOG_PERSONAL_API_KEY:-}
      POSTHOG_PROJECT_ID: ${POSTHOG_PROJECT_ID:-}

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - api
    environment:
      DOMAIN: ${DOMAIN}

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
